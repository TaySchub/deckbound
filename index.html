<!DOCTYPE html>
<!--
  Deckbound — a tower-defense deckbuilder (v1).

  Full loop: from the hub, spend Essence to unlock towers/perks (saved between
  runs), then Start Run — build & upgrade from your deck of 5 tower types, and
  survive 10 waves of mixed enemies defending the core. Win or lose, you earn
  Essence and get stronger over time. All game logic lives in main.js.

  Plain HTML + CSS + JavaScript for now. We can add Phaser 3 later if the
  real-time action needs it (see GAME_BRIEF.md).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Makes the page scale correctly on phones (needed for iPhone play). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Deckbound</title>

  <!-- Our styles live in a separate file to keep things easy to read. -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Page header: the game's title and a one-line reminder of what it is. -->
  <header class="site-header">
    <h1>Deckbound</h1>
    <p class="tagline">A tower-defense deckbuilder — draw, place, survive.</p>
  </header>

  <!-- Main play area. Everything the game draws will go on this canvas. -->
  <main class="stage">
    <!--
      The <canvas> is where all game graphics are drawn. Its internal drawing
      size (800x450) is fixed here; CSS controls how big it looks on screen.
      main.js draws the path, the core, and the running game loop onto it.
    -->
    <canvas id="game-canvas" width="800" height="450"
            aria-label="Deckbound game area: the level path and the core"></canvas>
  </main>

  <!-- Footer: a quiet status line we can use while building. -->
  <footer class="site-footer">
    <span>Deckbound — hub, deck, meta-progression, formula-scaled waves.</span>
  </footer>

  <!-- Balance numbers (difficulty & economy), generated from data/balance.json
       by tools/gen_balance.py. Loaded before main.js so window.BALANCE exists
       when the game reads it. Deferred scripts run in order. -->
  <script src="balance.data.js" defer></script>

  <!-- The game code. 'defer' means it runs after the page has loaded. -->
  <script src="main.js" defer></script>
</body>
</html>
