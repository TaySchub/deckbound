<!DOCTYPE html>
<!--
  Deckbound — a tower-defense deckbuilder (v1).

  Theme: hungry customers vs. runaway food. From the hub, spend Golden Forks to
  reserve customers/perks (saved between runs), then Open for Service — seat &
  upgrade customers from your regulars, and eat waves of runaway dishes before
  they reach the trash chute. Win or lose, you earn Golden Forks and get stronger
  over time. All game code lives in src/ (DOM-free logic in src/engine.js).

  Plain HTML + CSS + JavaScript for now. We can add Phaser 3 later if the
  real-time action needs it (see GAME_BRIEF.md).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Makes the page scale correctly on phones (needed for iPhone play). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Deckbound</title>

  <!-- Our styles live in a separate file to keep things easy to read. -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Page header: the game's title and a one-line reminder of what it is. -->
  <header class="site-header">
    <h1>Deckbound</h1>
    <p class="tagline">A tower-defense deckbuilder — hungry customers vs. runaway food.</p>
  </header>

  <!-- Main play area. Everything the game draws will go on this canvas. -->
  <main class="stage">
    <!--
      The <canvas> is where all game graphics are drawn. Its internal drawing
      size (800x450) is fixed here; CSS controls how big it looks on screen.
      src/render.js draws the belt, the trash chute, and the whole scene onto it.
    -->
    <canvas id="game-canvas" width="800" height="450"
            aria-label="Deckbound game area: the conveyor belt and the trash chute"></canvas>
  </main>

  <!-- Footer: a quiet status line we can use while building. -->
  <footer class="site-footer">
    <span>Deckbound — hungry customers vs. runaway food.</span>
  </footer>

  <!-- Balance numbers (difficulty & economy), generated from data/balance.json
       by tools/gen_balance.py. Loaded first so window.BALANCE exists when the
       game reads it. Deferred scripts run in order. -->
  <script src="balance.data.js?v=46e2668b" defer></script>

  <!-- The game code, split into modules (order matters; plain globals, no
       bundler — double-clicking index.html still works):
       data (constants + balance merge) -> engine (DOM-free logic) -> audio ->
       art (pure draw fns) -> render (UI/scene) -> main (boot/input/loop). -->
  <script src="src/data.js?v=25fc2cf2" defer></script>
  <script src="src/engine.js?v=e8326af0" defer></script>
  <script src="src/audio.js?v=a4651fd5" defer></script>
  <script src="src/art.js?v=73c540a0" defer></script>
  <script src="src/render.js?v=5775cd25" defer></script>
  <script src="src/main.js?v=824a9e2f" defer></script>
</body>
</html>
